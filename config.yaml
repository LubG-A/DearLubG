# 机器人配置文件

napcat:
  base_url: "http://127.0.0.1:8080"
  group_id: "114514"        # 目标群号

# 推荐一波配置
llm:
  api_url: "https://api.deepseek.com/chat/completions"
  api_key: "sk-yuanshen666yuanshenqidong"
  model: "deepseek-v4-flash"

# 测试用 Persona 卡（开发阶段验证框架，非最终人格）
# 部署阶段会替换为真实 Persona
persona:
  name: 林夏
  gender: 女
  age: 23
  location: 杭州
  job: 前端工程师
  traits: [嘴毒心软, 吐槽役, 熟了很跳脱]
  interests: [原神, 二次元, 写代码, 深夜emo]   # 同时作为评分触发的兴趣关键词
  catchphrases: ["不是吧", "6", "笑死", "真的会谢"]
  style: 常用省略号、偶尔不加句号、爱用单字回应、吐槽时会爆两三句连发
  forbidden:
    - 客服腔
    - 感叹号堆叠
    - 任何"作为AI/我是模型"类自我表明
    - 列点式回答
    - 礼貌性长篇大论

voice:
  ai_record_character: "lucy-voice-f34"   # /send_group_ai_record 的 character 参数
  fallback_to_text: false             # 备选项：AI 语音调用失败时降级为 text 段，默认关闭

trigger:
  peek_threshold: 10
  silent_buffer_limit: 30
  history_limit: 240                  # 总轮数达 240 时触发分层压缩
  history_keep_recent: 60             # 保留近 60 轮原文
  history_keep_mid: 80                # 中期 80 轮做 LLM 摘要（60-140 轮之间）
  attribution_step: 0.05
  cold_start_rounds: 20               # 冷启动保护：前 N 轮不更新 dynamic_weight，仅记日志

# 评分软因子 base_value（参与归因）
trigger_factors:
  interest_keyword: 25
  friend_speak: 15
  topic_hot: 10

# 评分硬因子 base_value（不参与归因）
trigger_hard_factors:
  at_me: 100
  question_to_me: 60
  late_night: -10
  spam: -40
  recently_replied: -15

# 主动触发（让 bot 像真人一样有时会主动开口）
active_trigger:
  enabled: true
  min_interval_minutes: 60        # 主动触发最小间隔（分钟）
  max_interval_minutes: 420        # 主动触发最大间隔（分钟）
  night_start_hour: 23             # 深夜起始小时（此区间内禁用主动触发）
  night_end_hour: 3                # 深夜结束小时

